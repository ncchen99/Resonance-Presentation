<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonance — Let lives influence lives</title>
  <link rel="icon" type="image/png" href="../../assets/images/icon.png" />

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────────────────────── */
    :root {
      /* Typography */
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;

      /* Color System — Warm Pastel Palette per DESIGN.md § 8 */
      --color-cream:            oklch(96.5% 0.015 75);
      --color-cream-dark:       oklch(93%   0.018 75);
      --color-card-bg:          oklch(97.5% 0.01  80);

      --color-terracotta:       oklch(62%   0.14  45);
      --color-terracotta-light: oklch(88%   0.08  55);

      --color-lavender:         oklch(80%   0.07  290);
      --color-sage:             oklch(78%   0.07  140);
      --color-yellow:           oklch(88%   0.10  90);
      --color-sky:              oklch(82%   0.07  220);

      --color-text:             oklch(26%   0.03  60);
      --color-text-muted:       oklch(52%   0.04  70);
    }

    /* ── Reset & Base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; overflow-x: clip; }

    body {
      font-family: var(--font-body);
      background: var(--color-cream);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      width: 100%;
      max-width: 100%;
      overflow-x: clip;
    }

    /* Sections inside <main> place decorative blobs with negative offsets;
       clip them to main's box so none of the host page shows through as a
       white gutter on the right. */
    main { display: block; width: 100%; max-width: 100%; overflow-x: clip; }

    /* ── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-cream-dark); }
    ::-webkit-scrollbar-thumb { background: var(--color-terracotta-light); border-radius: 99px; }

    /* ── Modal entrance animations ───────────────────────────────────── */
    @keyframes resModalFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes resModalPopIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Tweaks Panel ────────────────────────────────────────────────── */
    #tweaks-panel {
      display: none;
      position: fixed;
      bottom: 24px; right: 24px;
      width: 260px;
      background: var(--color-card-bg);
      border-radius: 20px 24px 18px 22px;
      padding: 20px;
      z-index: 9999;
      box-shadow: 0 4px 24px oklch(20% 0.04 60 / 0.12);
      border: 1px solid oklch(80% 0.02 75);
      font-family: var(--font-body);
    }
    #tweaks-panel.open { display: block; }
    .tweak-label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--color-text-muted);
      display: block; margin-bottom: 6px; margin-top: 14px;
    }
    .tweak-label:first-child { margin-top: 0; }
    .tweak-select, .tweak-range {
      width: 100%;
      font-family: var(--font-body); font-size: 13px;
      border: 1px solid oklch(80% 0.02 75);
      border-radius: 10px; padding: 7px 10px;
      background: var(--color-cream); color: var(--color-text);
      appearance: none; cursor: pointer;
    }
    .tweak-range { padding: 4px 0; border: none; background: none; accent-color: var(--color-terracotta); }
    .tweaks-title {
      font-family: var(--font-heading); font-size: 15px; font-weight: 700;
      color: var(--color-text); margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid oklch(80% 0.02 75);
    }
  </style>
</head>
<body>

<!-- ── Global SVG Filter Definitions ──────────────────────────────────────────
     Hand-drawn edge: feTurbulence + feDisplacementMap warps shape boundaries
     so borders look like they were drawn by hand rather than generated by machine.
     6 card variants (different seeds) + 1 button variant.
     These live in the DOM, referenced by CSS filter:url(#id) in components.
     ───────────────────────────────────────────────────────────────────────── -->
<!-- SVG filter defs removed: borders now use pure bezier path geometry (wobRect),
     not feDisplacementMap. Chalk texture filters are defined inline per-card. -->

<div id="root"></div>

<!-- Tweaks Panel (outside React tree for simplicity) -->
<div id="tweaks-panel">
  <div class="tweaks-title">✦ Tweaks</div>

  <label class="tweak-label">Accent Color</label>
  <select class="tweak-select" id="tweak-accent">
    <option value="terracotta">Terracotta (default)</option>
    <option value="sage">Sage Green</option>
    <option value="lavender">Lavender</option>
    <option value="yellow">Golden Yellow</option>
  </select>

  <label class="tweak-label">Card Density</label>
  <select class="tweak-select" id="tweak-density">
    <option value="normal">Normal (3-col)</option>
    <option value="compact">Compact (4-col)</option>
    <option value="airy">Airy (2-col)</option>
  </select>

  <label class="tweak-label">Grain Intensity</label>
  <input type="range" class="tweak-range" id="tweak-grain" min="0" max="3" step="1" value="1" />
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-muted);margin-top:2px">
    <span>None</span><span>Soft</span><span>Medium</span><span>Heavy</span>
  </div>
</div>

<!-- Component files -->
<script type="text/babel" src="components/atoms.jsx"></script>
<script type="text/babel" src="components/cards.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>

<!-- Main App -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "terracotta",
  "cardDensity": "compact",
  "grainIntensity": 2
}/*EDITMODE-END*/;

function App() {
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem('resonance-tweaks') || '{}'); } catch { return {}; }
  })();
  const cfg = { ...TWEAK_DEFAULTS, ...saved };

  return (
    <div>
      <SiteHeader />
      <main>
        <HeroSection />
        <CardFeedSection />
        <CTASection />
      </main>
      <SiteFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Tweaks wiring -->
<script>
// Register listener FIRST, then announce availability
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

const ACCENT_MAP = {
  terracotta: { '--color-terracotta': 'oklch(62% 0.14 45)', '--color-terracotta-light': 'oklch(88% 0.08 55)' },
  sage:       { '--color-terracotta': 'oklch(55% 0.13 140)', '--color-terracotta-light': 'oklch(80% 0.09 140)' },
  lavender:   { '--color-terracotta': 'oklch(58% 0.14 290)', '--color-terracotta-light': 'oklch(83% 0.08 290)' },
  yellow:     { '--color-terracotta': 'oklch(68% 0.15 80)', '--color-terracotta-light': 'oklch(90% 0.10 85)' },
};

const DENSITY_MAP = {
  normal:  'repeat(auto-fill, minmax(300px, 1fr))',
  compact: 'repeat(auto-fill, minmax(240px, 1fr))',
  airy:    'repeat(auto-fill, minmax(380px, 1fr))',
};

const GRAIN_MAP = [0, 0.055, 0.10, 0.18];

function applyTweaks(vals) {
  const root = document.documentElement;
  const accent = ACCENT_MAP[vals.accentColor] || ACCENT_MAP.terracotta;
  Object.entries(accent).forEach(([k, v]) => root.style.setProperty(k, v));
  // Card density
  document.querySelectorAll('[data-card-grid]').forEach(el => {
    el.style.gridTemplateColumns = DENSITY_MAP[vals.cardDensity] || DENSITY_MAP.normal;
  });
  // Grain — update CSS variable read by GrainOverlay fallback
  root.style.setProperty('--grain-opacity', GRAIN_MAP[vals.grainIntensity] ?? 0.055);
  // Persist
  localStorage.setItem('resonance-tweaks', JSON.stringify(vals));
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: vals }, '*');
}

// Load saved state
const saved = (() => { try { return JSON.parse(localStorage.getItem('resonance-tweaks') || '{}'); } catch { return {}; } })();
const current = Object.assign({}, { accentColor:'terracotta', cardDensity:'normal', grainIntensity:1 }, saved);

document.getElementById('tweak-accent').value   = current.accentColor;
document.getElementById('tweak-density').value  = current.cardDensity;
document.getElementById('tweak-grain').value    = current.grainIntensity;
applyTweaks(current);

['tweak-accent','tweak-density','tweak-grain'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    applyTweaks({
      accentColor:    document.getElementById('tweak-accent').value,
      cardDensity:    document.getElementById('tweak-density').value,
      grainIntensity: +document.getElementById('tweak-grain').value,
    });
  });
});
</script>
</body>
</html>
